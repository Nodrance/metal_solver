<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Ratio Solver</title>
    <style>
        @font-face {
            font-family: 'English Font';
            src: url('src/assets/old_english.ttf') format('truetype');
        }
        @font-face {
            font-family: 'French Script';
            src: url('src/assets/french_script.ttf') format('truetype');
        }
    </style>
    <style>
        :root {
            --color-background: #0d161f;

            --color-grid-bg: #1f2534;
            --color-clickable-bg: #587496;
            --color-disabled-clickable: #2a3544;
            --color-disabled-row: #181c27;
            --color-output-text: #c7e8eb;
            --color-transition-text: #f2e8cc;

            --color-output-ratio-bg: #212a30;
            --color-output-ratio-border: #738acc;

            --font-size: 40px;
            --letters-font: 'English Font', serif;
            --numbers-font: 'French Script', cursive;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 50px 30px;
            background-color: var(--color-background);
            color: #fff;
        }
        table {
            width: 100%;
            margin: auto;
            border-collapse: collapse;
            background-color: var(--color-grid-bg);
            font-family: var(--numbers-font);
            font-size: var(--font-size);
            table-layout: fixed;
        }
        th, td {
            border: 2px solid grey;
            text-align: center;
        }
        th:first-child, td.row-label {
            width: 22.222%;
        }
        th:not(:first-child), td:not(.row-label) {
            width: 11.111%;
        }
        th {
            font-family: var(--letters-font);
            font-size: calc(var(--font-size) * 0.7);
        }
        .metal-symbol {
            width: 60px;
            height: 60px;
            margin: -2px auto -10px auto;
        }
        .row-label {
            --font-multiplier: 0.6;
            font-family: var(--letters-font);
            font-size: calc(var(--font-size) * var(--font-multiplier));
            color: #fff;
            background-color: var(--color-grid-bg);
            padding: 0px 4px;
            user-select: none;
        }
        .transformation-row .row-label {
            background-color: var(--color-clickable-bg);
        }
        .transformation-row:hover .row-label {
            filter: brightness(85%);
        }
        .transformation-row.disabled-row .row-label {
            background-color: var(--color-disabled-clickable);
        }
        td:not(.row-label) {
            font-size: var(--font-size);
        }

        .input-row {
            background-color: var(--color-clickable-bg);
        }
        .input-row td:not(.row-label):hover {
            background-color: #0002;
        }
        .output-row {
            color: var(--color-output-text);
        }
        .transformation-row {
            color: var(--color-transition-text);
        }
        .disabled-row {
            background-color: var(--color-disabled-row) !important;
            color: #666 !important;
        }

        input {
            width: 100%;
            height: 100%;
            margin: 0;
            box-sizing: border-box;
            font-size: var(--font-size);
            background-color: transparent;
            text-align: center;
            color: #fff;
            border: none;
            font-family: var(--numbers-font);
        }
        input:focus-visible {
            border: none;
        }
        input::highlight {
            display: none;
            color: #F00;
        }
        input::-moz-selection {
            background-color: var(--color-clickable-bg);
            padding: 5px unset
        }
        

        #ratio-box {
            background-color: var(--color-output-ratio-bg);
            border: 2px solid var(--color-output-ratio-border);
            font-family: var(--letters-font);
            font-size: calc(var(--font-size) * 1.0);
            padding: 20px;
            text-align: center;
            width: 100%;
            margin: 30px auto;
            box-sizing: border-box;
        }
        #ratio-number {
            font-family: var(--numbers-font);
            font-size: calc(var(--font-size) * 1.5);
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <table id="the-table">
    </table>

    <div id="ratio-box">Best Ratio:<span id="ratio-number">0</span></div>

    <button id="font-button">Default Fonts</button>
    <button id="spoilers-button">Toggle Spoilers</button>

    <script>
        
    </script>

    <script type="module" src="src/web/script.js"></script>
</body>
